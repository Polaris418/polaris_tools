spring:
  datasource:
    url: jdbc:mysql://localhost:3306/polaris?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 10
      idle-timeout: 300000
      connection-timeout: 20000

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 1  # 使用数据库 1 用于测试，避免与开发环境冲突
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # 缓存配置
  cache:
    type: redis
    redis:
      time-to-live: 600000  # 10 分钟

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: test-secret-key-for-jwt-token-generation-minimum-256-bits-required
  expiration: 86400000  # 24 小时

# 日志配置
logging:
  level:
    root: INFO
    com.polaris: DEBUG
    org.springframework.cache: DEBUG
